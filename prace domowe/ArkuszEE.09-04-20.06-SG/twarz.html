<div id="prawy2">
<h2>Sprwadź cene swojej wizyty</h2></br>
<input type="checkbox"  id="pilling">Pilling </br>
<input type="checkbox"  id="maska">Maska</br>
<input type="checkbox"  id="masaz">Masaż twarzy</br>
<input type="checkbox"  id="regulacja">Regulacja brwi </br>
<button onclick=cena()>Sprawdź cenę</button>
<p id="kwota"></p>
</div>
</div>
<footer>
<p>Autor:XXXXXXXXXXX</p>
</footer>
<script>
    function cena() {
        var p = document.getElementById("pilling");
        var m = document.getElementById("maska");
        var a = document.getElementById("masaz");
        var r = document.getElementById("regulacja");
        var kwota = 0;
        if (p.checked == true) {
            kwota += 45;
        }
        if (m.checked == true) {
            kwota += 30;
        }
        if (a.checked == true) {
            kwota += 20;
        }
        if (r.checked == true) {
            kwota += 5;
        }
        document.getElementById("kwota").innerHTML = "Cena zabiegów: " + kwota;
    }
</script>
